name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Stage 1: Quality Gates
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint
        run: make lint
      - name: Type check
        run: make type-check
      - name: Security scan
        run: make security

  # Stage 2: Unit + ML Tests
  test-core:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Unit tests
        run: make test-unit
      - name: ML tests
        run: make test-ml

  # Stage 3: Integration Tests
  test-integration:
    needs: test-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Build model container
        run: |
          if [ -f model/Dockerfile ]; then
            make docker-build
          else
            echo "Dockerfile not yet created — skipping build"
          fi
      - name: Integration tests
        run: make test-integration

  # Stage 4: Performance (main branch only)
  test-perf:
    needs: test-integration
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Performance benchmark
        run: make test-perf
